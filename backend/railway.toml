# Railway config-as-code for the Link2Pay backend service.
# Applies to BOTH Railway environments (production/test) — per-environment
# differences (network, DB, fiat wall) live in Railway variables, never here.
# Full environment model: see ENVIRONMENTS.md.
#
# Dashboard settings this file relies on:
#   - Service root directory: backend
#   - production environment tracks branch `main`, test tracks `develop`
#   - DATABASE_URL references the environment's own Postgres:
#       ${{Postgres.DATABASE_URL}}

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"
watchPatterns = ["backend/**"]

[deploy]
# Runs `prisma migrate deploy` before boot — schema changes self-promote
# test-first because develop deploys before main is ever merged.
startCommand = "npm run start:prod"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
