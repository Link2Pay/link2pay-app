# Render Infrastructure-as-Code for the Link2Pay backend + Postgres.
# Frontend deploys separately on Vercel (see frontend/vercel.json).
#
# On every deploy the start command runs `prisma migrate deploy`, applying the
# committed migration baseline (backend/prisma/migrations) to the database.
# For an EXISTING db that was created with `db push` (no migration history),
# baseline it once before the first deploy:
#   npx prisma migrate resolve --applied 0_init
services:
  - type: web
    name: link2pay-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Database — provisioned below; Render injects the connection string.
      - key: DATABASE_URL
        fromDatabase:
          name: link2pay-db
          property: connectionString
      # CORS origin — set to the deployed Vercel URL (e.g. https://link2pay.vercel.app)
      - key: FRONTEND_URL
        sync: false
      # ── Stellar network (testnet shown; flip to public for mainnet) ──
      - key: STELLAR_NETWORK
        value: testnet
      - key: HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: SOROBAN_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: USDC_ISSUER
        value: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
      - key: EURC_ISSUER
        value: GDHU6WRG4IEQXM5NZ4BMPKOXHW76MZM4Y2IEMFDVXBSDP6SJY4ITNPP2
      # ── Anchor off-ramp ──
      - key: ANCHOR_PROVIDER
        value: mock-breb
      - key: ANCHOR_HOME_DOMAIN
        value: testanchor.stellar.org
      # Optional: Soroban receipt contract id once deployed
      - key: RECEIPT_CONTRACT_ID
        sync: false
      # Production-only Abroad credentials — leave unset for the demo
      - key: ABROAD_API_BASE
        sync: false
      - key: ABROAD_API_KEY
        sync: false

databases:
  - name: link2pay-db
    plan: free
