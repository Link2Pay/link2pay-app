<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme init: fija el tema antes del primer paint (evita flash). Oscuro por
         defecto; respeta la preferencia guardada. Debe reflejar src/lib/theme.ts.
         Archivo externo (no inline) porque el CSP de producción no permite
         'unsafe-inline' en script-src. -->
    <script src="/theme-init.js"></script>
    <!-- Favicon: SVG (símbolo Link2Pay) como principal; PNG como fallback legado. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/link2pay-favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#293E70" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Create secure non-custodial payment links on Stellar. Launch hosted checkout, accept XLM/USDC/EURC, and confirm settlements in seconds."
    />
    <meta name="application-name" content="Link2Pay" />
    <link rel="canonical" href="https://link2pay.xyz/" />

    <!-- Open Graph (preview al compartir: WhatsApp, Slack, Facebook…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Link2Pay" />
    <meta property="og:url" content="https://link2pay.xyz/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Link2Pay | Instant Stellar Payment Links" />
    <meta
      property="og:description"
      content="Generate hosted checkout links, accept multi-asset Stellar payments, and track real-time settlement status."
    />
    <meta property="og:image" content="https://link2pay.xyz/og-image.png" />
    <meta property="og:image:secure_url" content="https://link2pay.xyz/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Link2Pay — Instant Stellar Payment Links" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Link2Pay | Instant Stellar Payment Links" />
    <meta
      name="twitter:description"
      content="Hosted checkout on Stellar with non-custodial settlement for XLM, USDC, and EURC."
    />
    <meta name="twitter:image" content="https://link2pay.xyz/og-image.png" />
    <meta name="twitter:image:alt" content="Link2Pay — Instant Stellar Payment Links" />
    <title>Link2Pay | Instant Stellar Payment Links</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Display: Cabinet Grotesk · UI/body: Satoshi (Fontshare) -->
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <!-- Mono: JetBrains Mono (Google Fonts) para direcciones/hashes/IDs -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
